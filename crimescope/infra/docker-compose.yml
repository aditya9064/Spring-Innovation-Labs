services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: crimescope-postgres
    environment:
      POSTGRES_DB: crimescope
      POSTGRES_USER: crimescope
      POSTGRES_PASSWORD: crimescope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: crimescope-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:

