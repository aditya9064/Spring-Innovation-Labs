# Monthly UK & Wales risk-scoring pipeline.
#
# Notebooks live at /Workspace/Shared/Team_varanasi/ML and are imported
# separately via `databricks workspace import-dir crimescope/notebooks/ML ...`
# (see crimescope/scripts/databricks/import_uk.sh).
#
# Uses serverless job compute (workspace policy: no classic clusters).
resources:
  jobs:
    crimescope_uk_pipeline:
      name: crimescope-uk-pipeline

      schedule:
        # Monthly at 06:00 UTC on the 5th — data.police.uk publishes by the 1st.
        quartz_cron_expression: '0 0 6 5 * ?'
        timezone_id: UTC
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - adityamiriyala08@gmail.com

      tags:
        product: crimescope
        scope: uk
        owner: team_varanasi

      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ${var.notebook_root}/02_uk_ingest_and_geos
            source: WORKSPACE

        - task_key: features
          depends_on:
            - task_key: ingest
          notebook_task:
            notebook_path: ${var.notebook_root}/03_uk_panel_features_demographics
            source: WORKSPACE

        - task_key: train
          depends_on:
            - task_key: features
          notebook_task:
            notebook_path: ${var.notebook_root}/04_uk_train_and_evaluate
            source: WORKSPACE

        - task_key: score
          depends_on:
            - task_key: train
          notebook_task:
            notebook_path: ${var.notebook_root}/05_uk_score_and_serve
            source: WORKSPACE

        - task_key: export
          depends_on:
            - task_key: score
          notebook_task:
            notebook_path: ${var.notebook_root}/06_uk_export_for_backend
            source: WORKSPACE
