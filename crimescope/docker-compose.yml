services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: crimescope-db
    environment:
      POSTGRES_DB: crimescope
      POSTGRES_USER: crimescope
      POSTGRES_PASSWORD: crimescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crimescope -d crimescope"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
